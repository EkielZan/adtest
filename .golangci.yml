version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - gocritic

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
